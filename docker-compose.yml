services:
  mongo:
    image: mongo:latest
    container_name: intelligence_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelligence_backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/docintel
      UPLOAD_DIR: /app/uploads
      USE_SIMPLE_QUEUE: 'true'
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      - mongo
    networks:
      - app_network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intelligence_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  uploads_data:
  logs_data:
  mongo_data:

networks:
  app_network:
    driver: bridge
