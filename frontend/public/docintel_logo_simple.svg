<svg width="340" height="340" viewBox="0 0 340 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(170 170) rotate(90) scale(190)">
      <stop offset="0" stop-color="#0A1826"/>
      <stop offset="0.62" stop-color="#081521"/>
      <stop offset="1" stop-color="#050D16"/>
    </radialGradient>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(170 170) rotate(90) scale(120)">
      <stop offset="0" stop-color="#20D8FF" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#0BA8E2" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#0BA8E2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(170 170) rotate(90) scale(58)">
      <stop offset="0" stop-color="#63E8FF"/>
      <stop offset="0.43" stop-color="#1DB6E9"/>
      <stop offset="1" stop-color="#0A6BB8"/>
    </radialGradient>
    <radialGradient id="inner" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(160 158) rotate(52) scale(28 18)">
      <stop offset="0" stop-color="white" stop-opacity="0.9"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-60" y="-60" width="460" height="460" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#001018" flood-opacity="0.8"/>
    </filter>
    <filter id="soft" x="-80" y="-80" width="500" height="500" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="340" height="340" rx="26" fill="url(#bg)"/>
  <circle cx="170" cy="170" r="124" fill="url(#halo)" filter="url(#soft)"/>

  <!-- main spokes -->
  <g stroke="#18BEE0" stroke-width="3.1" stroke-linecap="round">
    <path d="M170 111V78"/>
    <path d="M170 229V262"/>
    <path d="M111 170H78"/>
    <path d="M229 170H262"/>
    <path d="M128 128L103 103"/>
    <path d="M212 128L237 103"/>
    <path d="M128 212L103 237"/>
    <path d="M212 212L237 237"/>
  </g>

  <!-- secondary branches -->
  <g stroke="#18BEE0" stroke-width="2.2" stroke-linecap="round" opacity="0.92">
    <path d="M103 103L91 91"/>
    <path d="M237 103L249 91"/>
    <path d="M103 237L91 249"/>
    <path d="M237 237L249 249"/>
    <path d="M78 170L60 170"/>
    <path d="M262 170L280 170"/>
    <path d="M170 78L170 60"/>
    <path d="M170 262L170 280"/>
  </g>

  <!-- nodes -->
  <g>
    <circle cx="170" cy="78" r="8" fill="#19B8DF"/>
    <circle cx="262" cy="117" r="7" fill="#19B8DF"/>
    <circle cx="262" cy="223" r="7" fill="#19B8DF"/>
    <circle cx="170" cy="262" r="8" fill="#19B8DF"/>
    <circle cx="78" cy="223" r="7" fill="#19B8DF"/>
    <circle cx="78" cy="117" r="7" fill="#19B8DF"/>
    <circle cx="103" cy="103" r="6.6" fill="#19B8DF"/>
    <circle cx="237" cy="103" r="6.6" fill="#19B8DF"/>
    <circle cx="103" cy="237" r="6.6" fill="#19B8DF"/>
    <circle cx="237" cy="237" r="6.6" fill="#19B8DF"/>
    <circle cx="91" cy="91" r="6" fill="#19B8DF"/>
    <circle cx="249" cy="91" r="6" fill="#19B8DF"/>
    <circle cx="91" cy="249" r="6" fill="#19B8DF"/>
    <circle cx="249" cy="249" r="6" fill="#19B8DF"/>
    <circle cx="60" cy="170" r="6" fill="#19B8DF"/>
    <circle cx="280" cy="170" r="6" fill="#19B8DF"/>
    <circle cx="170" cy="60" r="6" fill="#19B8DF"/>
    <circle cx="170" cy="280" r="6" fill="#19B8DF"/>
  </g>

  <!-- center -->
  <g filter="url(#shadow)">
    <circle cx="170" cy="170" r="59" fill="url(#core)"/>
    <circle cx="170" cy="170" r="44" fill="#1786C8" opacity="0.9"/>
    <circle cx="170" cy="170" r="30" fill="#0E60A6" opacity="0.92"/>
  </g>
  <circle cx="170" cy="170" r="58" stroke="#19BEE0" stroke-width="3" opacity="0.95"/>
  <circle cx="170" cy="170" r="41" stroke="#19BEE0" stroke-width="2" opacity="0.25"/>

  <ellipse cx="150" cy="146" rx="17" ry="12" fill="url(#inner)"/>
  <g stroke="#DDF7FF" stroke-width="4.2" stroke-linecap="round" opacity="0.95">
    <path d="M157 160H183"/>
    <path d="M151 171H183"/>
    <path d="M160 182H177"/>
  </g>
</svg>
